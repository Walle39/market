name: Update GMVM Data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  ACTIONS_CACHE_RESTORE_AND_PRUNE: 'false'

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pdfplumber numpy akshare xlrd openpyxl

      - name: Run data update script
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python fill_gmvm_excel_web.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --quiet && git diff --staged --quiet || (git commit -m "自动更新数据 $(date +'%Y-%m-%d')" && git push)
